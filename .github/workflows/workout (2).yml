name: Workout Bot

on:
  schedule:
    - cron: '0 7 * * 2,4,6'
  workflow_dispatch:

jobs:
  send-workout:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send workout
        run: python3 send_workout.py
