yaml
name: workout
on:
  schedule:
    - cron: '0 8 * * 2,4,6'
  workflow_dispatch:
jobs:
  send-workout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python3 send_workout.py
